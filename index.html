<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHOPLEX - Quantum AI + Real Network Scanner</title>
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --danger: #ff0040;
            --success: #00ff88;
            --warning: #ffaa00;
            --dark-bg: #0a0e1a;
            --panel-bg: #111827;
            --text: #e0e8f0;
            --text-muted: #6b7a8f;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .dashboard { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(30, 58, 95, 0.8));
            border-radius: 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-size: 9px; color: var(--text-muted); display: block; -webkit-text-fill-color: var(--text-muted); }
        .header-status { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 10px; padding: 4px 12px; border-radius: 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
        .status-dot.green { background: var(--success); }
        .status-dot.scanning { background: var(--primary); animation: pulse-fast 0.3s infinite; }
        .status-dot.quantum { background: var(--secondary); box-shadow: 0 0 15px rgba(124,58,237,0.3); animation: pulse-fast 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .time-display { font-size: 11px; color: var(--primary); font-family: monospace; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(17,24,39,0.9), rgba(30,58,95,0.5));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
        }
        .stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .stat-value { font-size: 22px; font-weight: 700; font-family: monospace; }
        .stat-value.info { color: var(--primary); }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-sub { font-size: 8px; color: var(--text-muted); }
        .panel {
            background: linear-gradient(135deg, rgba(17,24,39,0.95), rgba(30,58,95,0.7));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            gap: 6px;
        }
        .panel-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .panel-title .badge { font-size: 8px; padding: 2px 10px; border-radius: 10px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: var(--primary); }
        .panel-title .badge.real { background: rgba(255,170,0,0.15); border-color: var(--warning); color: var(--warning); }
        .panel-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .btn {
            padding: 4px 12px;
            border-radius: 6px;
            border: none;
            font-size: 9px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.05);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-auto { background: linear-gradient(135deg, var(--success), var(--primary)); color: #000; }
        .panel-body { padding: 10px 12px; max-height: 400px; overflow-y: auto; }
        .config-section {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .config-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .config-section label { font-size: 9px; color: var(--text-muted); min-width: 70px; }
        .config-section input {
            flex: 1;
            padding: 4px 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: var(--text);
            font-family: monospace;
            font-size: 10px;
            min-width: 100px;
        }
        .config-section input:focus {
            border-color: var(--primary);
            outline: none;
        }
        .toast {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(17,24,39,0.95);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.4s;
            z-index: 1000;
            max-width: 400px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast .title { font-weight: 700; font-size: 12px; }
        .toast .body { font-size: 10px; color: var(--text); margin-top: 2px; }
        .device-list { display: flex; flex-direction: column; gap: 4px; }
        .device-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border-left: 3px solid;
        }
        .device-item.online { border-left-color: var(--success); }
        .device-item.offline { border-left-color: var(--warning); }
        .device-info { flex: 1; }
        .device-info .name { font-weight: 600; font-size: 11px; }
        .device-info .ip { font-size: 9px; color: var(--text-muted); font-family: monospace; }
        .alert-log { display: flex; flex-direction: column; gap: 2px; max-height: 120px; overflow-y: auto; }
        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 3px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            font-size: 9px;
            border-left: 2px solid;
            gap: 6px;
        }
        .log-entry.info { border-left-color: var(--primary); }
        .log-entry.success { border-left-color: var(--success); }
        .log-entry.warning { border-left-color: var(--warning); }
        .backend-status.online { color: var(--success); }
        .backend-status.offline { color: var(--danger); }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); font-size: 10px; }
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <div class="title" id="toastTitle">🔍 Real Scan</div>
        <div class="body" id="toastBody">Scanning network...</div>
    </div>

    <div class="dashboard">
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">
                    <h1>ECHOPLEX</h1>
                    <span>🔴 IBM Quantum AI · REAL Network Scanner</span>
                </div>
            </div>
            <div class="header-status">
                <div class="status-badge">
                    <span class="status-dot scanning" id="systemStatusDot"></span>
                    <span id="systemStatusText">Ready</span>
                </div>
                <div class="status-badge">📡 <span id="activeConnections">0</span></div>
                <div class="status-badge">
                    <span class="backend-status offline" id="backendStatus">● Backend</span>
                </div>
                <div class="time-display" id="clockDisplay">--:--</div>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Devices</div>
                <div class="stat-value info" id="totalDevices">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Online</div>
                <div class="stat-value success" id="realDevices">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Phones</div>
                <div class="stat-value warning" id="phoneCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Computers</div>
                <div class="stat-value info" id="computerCount">0</div>
            </div>
        </section>

        <div style="display:grid;grid-template-columns:1fr;gap:12px;">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📱 Network Devices</div>
                    <div class="panel-actions">
                        <button class="btn btn-auto" onclick="startScan()">🔍 Scan</button>
                        <button class="btn btn-danger" onclick="stopScan()">⏹ Stop</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="device-list" id="deviceList">
                        <div class="text-center text-muted" style="padding:20px 0;">No devices found</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">⚙️ Settings</div>
                </div>
                <div class="panel-body">
                    <div class="config-section">
                        <div class="config-row">
                            <label>Backend URL:</label>
                            <input type="text" id="backendUrl" value="https://echoplex-net-solutions.onrender.com">
                            <button class="btn btn-primary" onclick="checkBackend()">Check</button>
                        </div>
                        
                        <div class="config-row">
                            <label>Your IP:</label>
                            <input type="text" id="ipInput" placeholder="192.168.1.1" value="192.168.1.1">
                        </div>

                        <div style="margin-top:8px;">
                            <button class="btn btn-auto" onclick="startScan()">🔍 Scan Network</button>
                            <button class="btn btn-danger" onclick="stopScan()">⏹ Stop Scan</button>
                        </div>
                    </div>
                    <div class="alert-log" id="alertLog" style="margin-top:10px;">
                        <div class="text-center text-muted">Ready</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top:12px;padding:8px 14px;background:rgba(17,24,39,0.9);border-radius:10px;border:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span>⚡ ECHOPLEX v5.0 · Backend Network Scanner</span>
            <span id="footerTimestamp">--</span>
        </div>
    </div>

    <script>
        const CONFIG = {
            backendUrl: 'https://echoplex-net-solutions.onrender.com',
            defaultIP: '192.168.1.1',
            scanInterval: 10000
        };

        let state = {
            devices: [],
            log: [],
            isScanning: false,
            backendOnline: false,
            scanActive: false
        };

        const $ = id => document.getElementById(id);
        const deviceList = $('deviceList');
        const alertLog = $('alertLog');
        const clockDisplay = $('clockDisplay');
        const totalDevices = $('totalDevices');
        const realDevices = $('realDevices');
        const phoneCount = $('phoneCount');
        const computerCount = $('computerCount');
        const systemStatusDot = $('systemStatusDot');
        const systemStatusText = $('systemStatusText');
        const activeConnections = $('activeConnections');
        const backendStatus = $('backendStatus');
        const toast = $('toast');
        const toastTitle = $('toastTitle');
        const toastBody = $('toastBody');
        const footerTimestamp = $('footerTimestamp');
        const backendUrlInput = $('backendUrl');
        const ipInput = $('ipInput');

        function getBackendUrl() {
            return backendUrlInput.value.trim() || CONFIG.backendUrl;
        }

        async function checkBackend() {
            const url = getBackendUrl();
            try {
                const response = await fetch(`${url}/api/status`);
                if (response.ok) {
                    const data = await response.json();
                    backendStatus.className = 'backend-status online';
                    backendStatus.textContent = '● Backend Online';
                    state.backendOnline = true;
                    showToast('✅ Backend Online', 'Connected to server');
                    addLogEntry('✅ Backend online', 'success');
                    return true;
                }
            } catch (e) {
                backendStatus.className = 'backend-status offline';
                backendStatus.textContent = '● Backend Offline';
                state.backendOnline = false;
                showToast('❌ Backend Offline', `Cannot connect to ${url}`);
                addLogEntry(`❌ Backend offline`, 'warning');
                return false;
            }
        }

        let scanInterval = null;

        function startScan() {
            if (scanInterval) return;
            
            state.scanActive = true;
            systemStatusDot.className = 'status-dot scanning';
            systemStatusText.textContent = 'Scanning';
            
            addLogEntry('🔍 Scan started', 'info');
            state.devices = [];
            updateUI();
            
            performScan();
            scanInterval = setInterval(performScan, CONFIG.scanInterval);
        }

        function stopScan() {
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
            state.scanActive = false;
            systemStatusDot.className = 'status-dot green';
            systemStatusText.textContent = 'Paused';
            addLogEntry('⏸ Scan paused', 'info');
        }

        async function performScan() {
            if (state.isScanning) return;
            
            state.isScanning = true;
            
            try {
                const userIP = ipInput.value.trim() || '192.168.1.1';
                const parts = userIP.split('.');
                const baseIP = `${parts[0]}.${parts[1]}.${parts[2]}`;
                
                const commonIPs = [
                    `${baseIP}.1`, `${baseIP}.2`, `${baseIP}.10`, `${baseIP}.20`,
                    `${baseIP}.50`, `${baseIP}.100`, `${baseIP}.101`, `${baseIP}.102`,
                    `${baseIP}.103`, `${baseIP}.104`, `${baseIP}.105`, `${baseIP}.106`,
                    `${baseIP}.107`, `${baseIP}.108`, `${baseIP}.109`, `${baseIP}.110`,
                    `${baseIP}.120`, `${baseIP}.130`, `${baseIP}.140`, `${baseIP}.150`,
                    `${baseIP}.160`, `${baseIP}.170`, `${baseIP}.180`, `${baseIP}.190`,
                    `${baseIP}.200`, `${baseIP}.201`, `${baseIP}.210`, `${baseIP}.220`,
                    `${baseIP}.230`, `${baseIP}.240`, `${baseIP}.250`, `${baseIP}.254`
                ];

                let foundCount = 0;
                for (const ip of commonIPs) {
                    const result = await scanSingleIP(ip);
                    if (result) foundCount++;
                }

                updateUI();
                
                if (foundCount > 0) {
                    showToast('✅ Found Devices', `${foundCount} device(s) online`);
                    addLogEntry(`✅ Found ${foundCount} devices`, 'success');
                }

            } catch (error) {
                addLogEntry(`❌ Scan error: ${error.message}`, 'warning');
            }
            
            state.isScanning = false;
        }

        async function scanSingleIP(ip) {
            const backendUrl = getBackendUrl();
            try {
                const response = await fetch(`${backendUrl}/api/scan-ip?ip=${encodeURIComponent(ip)}`);
                
                if (!response.ok) return null;

                const data = await response.json();
                
                if (data.device && data.device.online) {
                    const existingIndex = state.devices.findIndex(d => d.ip === data.device.ip);
                    if (existingIndex >= 0) {
                        state.devices[existingIndex] = data.device;
                    } else {
                        state.devices.push(data.device);
                    }
                    return true;
                }
                
                return null;
            } catch (error) {
                return null;
            }
        }

        function showToast(title, body) {
            toastTitle.textContent = title;
            toastBody.textContent = body;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        function addLogEntry(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            entry.innerHTML = `
                <span>${timeStr}</span>
                <span>${msg}</span>
            `;
            
            if (alertLog.firstChild && alertLog.firstChild.classList.contains('text-center')) {
                alertLog.innerHTML = '';
            }
            alertLog.insertBefore(entry, alertLog.firstChild);

            state.log.push({ time: timeStr, msg, type });
            if (state.log.length > 50) {
                state.log.shift();
            }
        }

        function updateUI() {
            const online = state.devices.filter(d => d.online).length;
            const phones = state.devices.filter(d => d.isPhone).length;
            const computers = state.devices.filter(d => d.isComputer).length;

            totalDevices.textContent = state.devices.length;
            realDevices.textContent = online;
            phoneCount.textContent = phones;
            computerCount.textContent = computers;
            activeConnections.textContent = online;

            if (state.devices.length === 0) {
                deviceList.innerHTML = '<div class="text-center text-muted" style="padding:20px 0;">No devices found</div>';
                return;
            }

            deviceList.innerHTML = state.devices.map(device => {
                const icon = device.type.split(' ')[0];
                const statusClass = device.online ? 'online' : 'offline';
                return `
                    <div class="device-item ${statusClass}">
                        <div style="font-size:14px;">${icon}</div>
                        <div class="device-info">
                            <div class="name">${device.hostname || device.ip}</div>
                            <div class="ip">${device.ip} · ${device.type}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function init() {
            setInterval(() => {
                const now = new Date();
                clockDisplay.textContent = now.toLocaleTimeString();
                footerTimestamp.textContent = now.toLocaleString();
            }, 1000);

            setTimeout(checkBackend, 500);
            updateUI();
            addLogEntry('⚡ ECHOPLEX Ready', 'success');
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
